name: 🛠️ CI

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or ref to build'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Verify HEAD
        if: github.event_name == 'push'
        run: |
          remote_sha=$(git ls-remote origin "${{ github.ref }}" | cut -f1)
          if [ "$remote_sha" != "${{ github.sha }}" ]; then
            echo "Stale re-run: ${{ github.sha }} is no longer HEAD of ${{ github.ref }} ($remote_sha)"
            exit 1
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch,prefix=branch-
            type=raw,value=smoke-test,enable=${{ github.ref != 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      - uses: docker/build-push-action@v5
        with:
          load: ${{ github.ref != 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          push: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
      - name: Smoke test
        if: github.ref != 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: docker run --rm ghcr.io/${{ github.repository }}:smoke-test --version

  release:
    name: Release
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: cycjimmy/semantic-release-action@v4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
        if: steps.semantic.outputs.new_release_published == 'true'
      - uses: docker/login-action@v3
        if: steps.semantic.outputs.new_release_published == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        if: steps.semantic.outputs.new_release_published == 'true'
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.semantic.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.semantic.outputs.new_release_version }}
            type=semver,pattern={{major}},value=${{ steps.semantic.outputs.new_release_version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        if: steps.semantic.outputs.new_release_published == 'true'
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
